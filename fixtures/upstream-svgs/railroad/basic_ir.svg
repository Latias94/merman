<svg id="basic_ir" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="railroad-diagram" style="max-width: 368px; background-color: white;" viewBox="0 0 368 194.5" role="graphics-document document" aria-roledescription="railroad"><style>#basic_ir{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#basic_ir .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#basic_ir .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#basic_ir .error-icon{fill:#552222;}#basic_ir .error-text{fill:#552222;stroke:#552222;}#basic_ir .edge-thickness-normal{stroke-width:1px;}#basic_ir .edge-thickness-thick{stroke-width:3.5px;}#basic_ir .edge-pattern-solid{stroke-dasharray:0;}#basic_ir .edge-thickness-invisible{stroke-width:0;fill:none;}#basic_ir .edge-pattern-dashed{stroke-dasharray:3;}#basic_ir .edge-pattern-dotted{stroke-dasharray:2;}#basic_ir .marker{fill:#333333;stroke:#333333;}#basic_ir .marker.cross{stroke:#333333;}#basic_ir svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#basic_ir p{margin:0;}#basic_ir .railroad-diagram{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#basic_ir .railroad-terminal rect{fill:#ffffde;stroke:hsl(60, 60%, 83.5294117647%);stroke-width:2px;}#basic_ir .railroad-terminal text{fill:#000021;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;text-anchor:middle;dominant-baseline:middle;}#basic_ir .railroad-nonterminal rect{fill:#ECECFF;stroke:hsl(240, 60%, 86.2745098039%);stroke-width:2px;}#basic_ir .railroad-nonterminal text{fill:#131300;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;text-anchor:middle;dominant-baseline:middle;}#basic_ir .railroad-line{stroke:#333333;stroke-width:2px;fill:none;}#basic_ir .railroad-start circle,#basic_ir .railroad-end circle{fill:#333333;}#basic_ir .railroad-comment ellipse{fill:rgba(232,232,232, 0.8);stroke:hsl(80, 60%, 86.2745098039%);stroke-width:2px;}#basic_ir .railroad-comment text{fill:rgb(6.3333333334, 0, 19.0000000001);font-style:italic;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;text-anchor:middle;dominant-baseline:middle;}#basic_ir .railroad-special rect{fill:hsl(80, 100%, 96.2745098039%);stroke:hsl(80, 60%, 86.2745098039%);stroke-width:2px;stroke-dasharray:5,3;}#basic_ir .railroad-special text{fill:#131300;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;text-anchor:middle;dominant-baseline:middle;}#basic_ir .railroad-rule-name{font-weight:bold;fill:#333;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#basic_ir .node .neo-node{stroke:#9370DB;}#basic_ir [data-look="neo"].node rect,#basic_ir [data-look="neo"].cluster rect,#basic_ir [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#basic_ir [data-look="neo"].swimlane.cluster rect{filter:none;}#basic_ir [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#basic_ir [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#basic_ir [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#basic_ir [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#basic_ir [data-look="neo"].node circle .state-start{fill:#000000;}#basic_ir [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#basic_ir [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#basic_ir :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="railroad-rule" transform="translate(0, 10)"><g transform="translate(81.62