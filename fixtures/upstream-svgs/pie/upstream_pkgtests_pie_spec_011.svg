<svg id="upstream_pkgtests_pie_spec_011" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 546.126953125 450" style="max-width: 546.127px; background-color: white;" role="graphics-document document" aria-roledescription="pie" aria-describedby="chart-desc-upstream_pkgtests_pie_spec_011" aria-labelledby="chart-title-upstream_pkgtests_pie_spec_011"><title id="chart-title-upstream_pkgtests_pie_spec_011">simple pie char demo</title><desc id="chart-desc-upstream_pkgtests_pie_spec_011">pie chart with 3 sections: dogs, cats, rats. Most are dogs.</desc><style>#upstream_pkgtests_pie_spec_011{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#upstream_pkgtests_pie_spec_011 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#upstream_pkgtests_pie_spec_011 .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#upstream_pkgtests_pie_spec_011 .error-icon{fill:#552222;}#upstream_pkgtests_pie_spec_011 .error-text{fill:#552222;stroke:#552222;}#upstream_pkgtests_pie_spec_011 .edge-thickness-normal{stroke-width:1px;}#upstream_pkgtests_pie_spec_011 .edge-thickness-thick{stroke-width:3.5px;}#upstream_pkgtests_pie_spec_011 .edge-pattern-solid{stroke-dasharray:0;}#upstream_pkgtests_pie_spec_011 .edge-thickness-invisible{stroke-width:0;fill:none;}#upstream_pkgtests_pie_spec_011 .edge-pattern-dashed{stroke-dasharray:3;}#upstream_pkgtests_pie_spec_011 .edge-pattern-dotted{stroke-dasharray:2;}#upstream_pkgtests_pie_spec_011 .marker{fill:#333333;stroke:#333333;}#upstream_pkgtests_pie_spec_011 .marker.cross{stroke:#333333;}#upstream_pkgtests_pie_spec_011 svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#upstream_pkgtests_pie_spec_011 p{margin:0;}#upstream_pkgtests_pie_spec_011 .pieCircle{stroke:black;stroke-width:2px;opacity:0.7;}#upstream_pkgtests_pie_spec_011 .pieCircle.highlighted{scale:1.05;opacity:1;}#upstream_pkgtests_pie_spec_011 .pieCircle.highlightedOnHover:hover{transition-duration:250ms;scale:1.05;opacity:1;}#upstream_pkgtests_pie_spec_011 .pieOuterCircle{stroke:black;stroke-width:2px;fill:none;}#upstream_pkgtests_pie_spec_011 .pieTitleText{text-anchor:middle;font-size:25px;fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;}#upstream_pkgtests_pie_spec_011 .slice{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#333;font-size:17px;}#upstream_pkgtests_pie_spec_011 .legend text{fill:black;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:17px;}#upstream_pkgtests_pie_spec_011 .node .neo-node{stroke:#9370DB;}#upstream_pkgtests_pie_spec_011 [data-look="neo"].node rect,#upstream_pkgtests_pie_spec_011 [data-look="neo"].cluster rect,#upstream_pkgtests_pie_spec_011 [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_pkgtests_pie_spec_011 [data-look="neo"].swimlane.cluster rect{filter:none;}#upstream_pkgtests_pie_spec_011 [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#upstream_pkgtests_pie_spec_011 [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_pkgtests_pie_spec_011 [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#upstream_pkgtests_pie_spec_011 [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_pkgtests_pie_spec_011 [data-look="neo"].node circle .state-start{fill:#000000;}#upstream_pkgtests_pie_spec_011 [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_pkgtests_pie_spec_011 [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_pkgtests_pie_spec_011 :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g transform="translate(225,225)"><g><circle cx="0" cy="0" r="186" class="pieOuterCircle"/><path d="M0,-185A185,185,0,1,1,0,185A185,185,0,1,1,0,-185Z" fill="#ffffde" class="pieCircle"/><text transform="translate(8.495987169084764e-15,138.75)" class="slice" style="text-anchor: middle;">100%</text></g><text x="0" y="-200" class="pieTitleText">Default text position: Animal adoption</text><g class="legend" transform="translate(216,-22)"><rect width="18" height="18" style="fill: rgb(236, 236, 255); stroke: rgb(236, 236, 255);"/><text x="22" y="14">dogs</text></g><g class="legend" transform="translate(216,0)"><rect width="18" height="18" style="fill: rgb(255, 255, 222); stroke: rgb(255, 255, 222);"/><text x="22" y="14">rats</text></g></g></svg>