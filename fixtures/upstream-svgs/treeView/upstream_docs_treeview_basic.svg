<svg id="upstream_docs_treeview_basic" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-0.5 0 103.4765625 145" style="max-width: 103.477px; background-color: white;" role="graphics-document document" aria-roledescription="treeView"><style>#upstream_docs_treeview_basic{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#upstream_docs_treeview_basic .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#upstream_docs_treeview_basic .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#upstream_docs_treeview_basic .error-icon{fill:#552222;}#upstream_docs_treeview_basic .error-text{fill:#552222;stroke:#552222;}#upstream_docs_treeview_basic .edge-thickness-normal{stroke-width:1px;}#upstream_docs_treeview_basic .edge-thickness-thick{stroke-width:3.5px;}#upstream_docs_treeview_basic .edge-pattern-solid{stroke-dasharray:0;}#upstream_docs_treeview_basic .edge-thickness-invisible{stroke-width:0;fill:none;}#upstream_docs_treeview_basic .edge-pattern-dashed{stroke-dasharray:3;}#upstream_docs_treeview_basic .edge-pattern-dotted{stroke-dasharray:2;}#upstream_docs_treeview_basic .marker{fill:#333333;stroke:#333333;}#upstream_docs_treeview_basic .marker.cross{stroke:#333333;}#upstream_docs_treeview_basic svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#upstream_docs_treeview_basic p{margin:0;}#upstream_docs_treeview_basic .treeView-node-label{font-size:16px;fill:black;white-space:pre;}#upstream_docs_treeview_basic .treeView-node-dir{font-weight:bold;}#upstream_docs_treeview_basic .treeView-node-line{stroke:black;}#upstream_docs_treeview_basic .treeView-node-icon{color:#546e7a;}#upstream_docs_treeview_basic .treeView-node-description{font-size:16px;fill:#6a9955;font-style:italic;white-space:pre;}#upstream_docs_treeview_basic .treeView-highlight-bg{fill:rgba(255, 193, 7, 0.15);stroke:#ffc107;stroke-width:1;}#upstream_docs_treeview_basic .node .neo-node{stroke:#9370DB;}#upstream_docs_treeview_basic [data-look="neo"].node rect,#upstream_docs_treeview_basic [data-look="neo"].cluster rect,#upstream_docs_treeview_basic [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_docs_treeview_basic [data-look="neo"].swimlane.cluster rect{filter:none;}#upstream_docs_treeview_basic [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#upstream_docs_treeview_basic [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_docs_treeview_basic [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#upstream_docs_treeview_basic [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_docs_treeview_basic [data-look="neo"].node circle .state-start{fill:#000000;}#upstream_docs_treeview_basic [data-look="neo"].icon-shape .icon{fill:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_docs_treeview_basic [data-look="neo"].icon-shape .icon-neo path{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#upstream_docs_treeview_basic :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="tree-view"><g><text dominant-baseline="middle" class="treeView-node-label treeView-node-dir" x="5" y="14.5">/</text></g><line x1="-10" y1="14.5" x2="0" y2="14.5" stroke-width="1" class="treeView-node-line"/><g><text dominant-baseline="middle" class="treeView-node-label" x="20" y="43.5">packages</text></g><line x1="5" y1="43.5" x2="15" y2="43.5" stroke-width="1" class="treeView-node-line"/><g><text dominant-baseline="middle" class="treeView-node-label" x="35" y="72.5">mermaid</text></g><line x1=