name: Release Android (AAR)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload the AAR to, for example v0.7.0-alpha.2"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    environment: github-release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}

      - name: Read version from tag
        id: version
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "::error::Release tag '$RELEASE_TAG' must start with v."
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Verify Android package version matches tag
        run: |
          ANDROID_VERSION=$(grep '^version = ' platforms/android/build.gradle.kts | head -1 | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')
          if [ "$ANDROID_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Android version '$ANDROID_VERSION' does not match tag ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r28

      - name: Build Android native libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: python3 platforms/android/build-android.py --targets aarch64-linux-android x86_64-linux-android

      - name: Build Android AAR
        run: gradle -p platforms/android assembleRelease --stacktrace

      - name: Verify Maven publication metadata
        run: gradle -p platforms/android publishReleasePublicationToLocalStagingRepository --stacktrace

      - name: Prepare release asset
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p target/release-assets
          cp platforms/android/build/outputs/aar/*.aar "target/release-assets/merman-android-${RELEASE_TAG}.aar"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: merman-android-aar
          path: target/release-assets/*.aar

      - name: Upload AAR to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" target/release-assets/*.aar --clobber
          else
            echo "::warning::GitHub Release $RELEASE_TAG does not exist yet; AAR artifact was uploaded for manual attachment."
          fi
