name: Release Android (AAR)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload the AAR to, for example v0.8.0-alpha.2"
        required: true
        type: string
      source_ref:
        description: "Protected branch (main), matching release tag, refs/tags/<release-tag>, or full 40-character SHA to build from"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  validate-inputs:
    name: validate-inputs
    runs-on: ubuntu-24.04
    outputs:
      source_ref: ${{ steps.release.outputs.source_ref }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release inputs
        id: release
        shell: bash
        env:
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
          DISPATCH_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$'
          tag_re="^v${semver_re#^}"
          sha_re='^[0-9a-fA-F]{40}$'

          fail() {
            echo "::error::$1" >&2
            exit 1
          }

          RELEASE_TAG="$DISPATCH_RELEASE_TAG"
          SOURCE_REF="$DISPATCH_SOURCE_REF"

          [[ "$RELEASE_TAG" =~ $tag_re ]] || fail "release_tag must match vX.Y.Z or vX.Y.Z-alpha.N/beta.N/rc.N."
          [[ "$SOURCE_REF" != *$'\n'* && "$SOURCE_REF" != *$'\r'* ]] || fail "source_ref must be a single line."
          if [[ "$SOURCE_REF" == "main" || "$SOURCE_REF" == "refs/heads/main" ]]; then
            :
          elif [[ "$SOURCE_REF" =~ $sha_re ]]; then
            :
          elif [[ "$SOURCE_REF" =~ $tag_re || "$SOURCE_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            source_tag="${SOURCE_REF#refs/tags/}"
            [[ "$source_tag" == "$RELEASE_TAG" ]] || fail "source_ref tag must match release_tag."
          else
            fail "source_ref must be main, refs/heads/main, a matching release tag, refs/tags/<release-tag>, or a full 40-character SHA."
          fi

          VERSION="${RELEASE_TAG#v}"
          [[ "$VERSION" =~ $semver_re ]] || fail "release_tag contains an unsupported SemVer version."

          {
            printf 'source_ref=%s\n' "$SOURCE_REF"
            printf 'release_tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: validate-inputs
    runs-on: ubuntu-24.04
    environment: github-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}

      - name: Use validated release metadata
        id: version
        env:
          RELEASE_TAG: ${{ needs.validate-inputs.outputs.release_tag }}
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: |
          set -euo pipefail
          {
            printf 'tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Verify Android package version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ANDROID_VERSION=$(grep '^version = ' platforms/android/build.gradle.kts | head -1 | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')
          if [ "$ANDROID_VERSION" != "$VERSION" ]; then
            echo "::error::Android version '$ANDROID_VERSION' does not match tag $VERSION"
            exit 1
          fi

      - name: Verify FFI publish surface
        run: python3 scripts/verify-ffi-publish-surface.py

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r28

      - name: Build Android native libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: python3 platforms/android/build-android.py --targets aarch64-linux-android x86_64-linux-android

      - name: Build Android AAR
        run: gradle -p platforms/android assembleRelease --stacktrace

      - name: Verify Maven publication metadata
        run: gradle -p platforms/android publishReleasePublicationToLocalStagingRepository --stacktrace

      - name: Prepare release asset
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p target/release-assets
          cp platforms/android/build/outputs/aar/*.aar "target/release-assets/merman-android-${RELEASE_TAG}.aar"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: merman-android-aar
          path: target/release-assets/*.aar

      - name: Upload AAR to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" target/release-assets/*.aar --clobber
          else
            echo "::warning::GitHub Release $RELEASE_TAG does not exist yet; AAR artifact was uploaded for manual attachment."
          fi
