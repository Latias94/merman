name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Verify release crate order docs
        run: python3 scripts/verify-release-crate-order.py

      - name: Test release and workflow hygiene scripts
        run: python3 -m unittest scripts/test_verify_release_crate_order.py scripts/test_workflow_path_filters.py scripts/test_release_workflow_security.py scripts/test_verify_platform_bindings.py

      - name: Check whitespace (pull request)
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"

      - name: Check whitespace (push)
        if: github.event_name != 'pull_request'
        run: |
          base="${{ github.event.before }}"
          if [[ "$base" =~ ^0+$ ]]; then
            git show --check --format= --no-renames HEAD
          else
            git diff --check "$base...${{ github.sha }}"
          fi

  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            parity: true
          - os: macos-15
            parity: false
          - os: windows-2025-vs2026
            parity: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Free disk space (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            "$AGENT_TOOLSDIRECTORY/CodeQL"
          sudo docker image prune --all --force || true
          df -h

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Test (nextest)
        run: cargo nextest run --cargo-quiet

      - name: Test (nextest, merman render)
        if: matrix.parity
        run: cargo nextest run -p merman --features render --cargo-quiet

      - name: Test C FFI no-render validation smoke
        if: matrix.parity
        run: cargo nextest run -p merman-ffi --no-default-features --features core-full,core-host --test c_consumer_smoke --cargo-quiet

      - name: Build (release)
        run: cargo build --release --locked -p merman-cli

      - name: Override inventory
        if: matrix.parity
        run: cargo run --release -p xtask -- report-overrides

      - name: SVG DOM parity
        if: matrix.parity
        run: cargo run --release -p xtask -- compare-all-svgs --check-dom --dom-mode parity --dom-decimals 3

      - name: SVG DOM parity (parity-root, non-blocking)
        if: matrix.parity
        continue-on-error: true
        run: cargo run --release -p xtask -- compare-all-svgs --check-dom --dom-mode parity-root --dom-decimals 3 --flowchart-text-measurer vendored --report-root

  typst-package:
    name: typst-package
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      TYPST_CLI_VERSION: "0.15.0"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install wasm-tools
        uses: taiki-e/install-action@wasm-tools

      - name: Download Typst
        shell: bash
        run: |
          set -euo pipefail
          typst_asset="typst-x86_64-unknown-linux-musl.tar.xz"
          typst_root="${RUNNER_TEMP}/typst-${TYPST_CLI_VERSION}"
          download_dir="$(mktemp -d)"
          curl -fsSL --retry 3 --retry-connrefused --retry-delay 2 \
            -o "${download_dir}/${typst_asset}" \
            "https://github.com/typst/typst/releases/download/v${TYPST_CLI_VERSION}/${typst_asset}"
          tar -xJf "${download_dir}/${typst_asset}" -C "${download_dir}"
          mkdir -p "${typst_root}"
          install -m 0755 "${download_dir}/typst-x86_64-unknown-linux-musl/typst" "${typst_root}/typst"
          "${typst_root}/typst" --version

      - name: Test Typst plugin crate
        run: cargo test -p merman-typst-plugin

      - name: Build Typst package
        run: cargo run -p xtask -- build-typst-package

      - name: Check Typst wasm ABI and size
        run: cargo run -p xtask -- profile-budget check-wasm --profile typst-wasm --wasm target/wasm32-unknown-unknown/wasm-size/merman_typst_plugin.wasm

      - name: Smoke Typst package
        shell: bash
        run: |
          set -euo pipefail
          typst_bin="${RUNNER_TEMP}/typst-${TYPST_CLI_VERSION}/typst"
          cargo run -p xtask -- typst-package-smoke --skip-wasm-build --typst "${typst_bin}"

      - name: Upload Typst package smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: typst-package-smoke
          path: target/typst-package-smoke
          if-no-files-found: ignore

  typst-package-compat:
    name: typst-package-compat
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      TYPST_COMPAT_CLI_VERSION: "0.15.0"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install wasm-tools
        uses: taiki-e/install-action@wasm-tools

      - name: Check WASM size budgets
        run: cargo run -p xtask -- wasm-size-matrix --budget-file docs/release/WASM_SIZE_BUDGETS.json

      - name: Build Typst package
        run: cargo run -p xtask -- build-typst-package

      - name: Download Typst compatibility version
        shell: bash
        run: |
          set -euo pipefail
          typst_asset="typst-x86_64-unknown-linux-musl.tar.xz"
          typst_root="${RUNNER_TEMP}/typst-${TYPST_COMPAT_CLI_VERSION}"
          download_dir="$(mktemp -d)"
          curl -fsSL --retry 3 --retry-connrefused --retry-delay 2 \
            -o "${download_dir}/${typst_asset}" \
            "https://github.com/typst/typst/releases/download/v${TYPST_COMPAT_CLI_VERSION}/${typst_asset}"
          tar -xJf "${download_dir}/${typst_asset}" -C "${download_dir}"
          mkdir -p "${typst_root}"
          install -m 0755 "${download_dir}/typst-x86_64-unknown-linux-musl/typst" "${typst_root}/typst"
          "${typst_root}/typst" --version

      - name: Smoke Typst compatibility version
        shell: bash
        run: |
          set -euo pipefail
          typst_bin="${RUNNER_TEMP}/typst-${TYPST_COMPAT_CLI_VERSION}/typst"
          cargo run -p xtask -- typst-package-smoke --skip-wasm-build --tests-only --typst "${typst_bin}"

      - name: Upload Typst package compatibility artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: typst-package-compat-smoke
          path: target/typst-package-smoke
          if-no-files-found: ignore

  platform-script-syntax:
    name: platform-script-syntax
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Check Python platform scripts
        run: |
          python3 -m py_compile \
            scripts/verify-ffi-publish-surface.py \
            scripts/verify-platform-bindings.py \
            scripts/build-python-uniffi-wheel.py \
            platforms/android/build-android.py \
            platforms/flutter/tool/android-smoke.py

      - name: Verify FFI publish surface
        run: python3 scripts/verify-ffi-publish-surface.py

      - name: Check shell scripts
        run: bash -n scripts/build-apple-xcframework.sh platforms/ios/build-ios.sh platforms/flutter/build-ios.sh platforms/flutter/build-desktop.sh

  platform-bindings:
    name: platform-bindings
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      KOTLIN_VERSION: "1.9.24"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-linux-android

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Kotlin compiler
        shell: bash
        run: |
          set -euo pipefail
          curl -L \
            -o "$RUNNER_TEMP/kotlin-compiler.zip" \
            "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
          unzip -q "$RUNNER_TEMP/kotlin-compiler.zip" -d "$RUNNER_TEMP/kotlin"
          echo "$RUNNER_TEMP/kotlin/kotlinc/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/kotlin/kotlinc/bin/kotlinc" -version

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          channel: stable
          cache: true

      - name: Precache Flutter Android artifacts
        run: flutter precache --android

      - name: Verify platform bindings
        run: python3 scripts/verify-platform-bindings.py

  android-instrumentation:
    name: android-instrumentation
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      ANDROID_NDK_VERSION: "26.3.11579264"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install "ndk;${ANDROID_NDK_VERSION}" "platforms;android-35"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Run Android instrumentation smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          script: python3 scripts/verify-platform-bindings.py --only-android-instrumentation-smoke --gradle-path gradle

  python-uniffi-wheel:
    name: python-uniffi-wheel
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and smoke Python UniFFI wheel
        run: python scripts/build-python-uniffi-wheel.py --run-smoke

      - name: Run Python example
        run: PYTHONPATH=platforms/python/merman/src python platforms/python/merman/examples/smoke.py

  c-ffi-example:
    name: c-ffi-example
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build merman C ABI library
        run: cargo build -p merman-ffi --release

      - name: Build and run C example
        run: |
          cc -I crates/merman-ffi/include \
            crates/merman-ffi/examples/render_svg.c \
            -L target/release -lmerman_ffi \
            -Wl,-rpath,"$PWD/target/release" \
            -o target/merman-ffi-render-svg
          target/merman-ffi-render-svg | grep -q '<svg'

  flutter-package-check:
    name: flutter-package-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          channel: stable
          cache: true

      - name: Validate Flutter package
        working-directory: platforms/flutter
        run: |
          flutter pub get
          flutter analyze
          dart format --set-exit-if-changed lib example

      - name: Run Dart FFI smoke
        working-directory: platforms/flutter
        run: |
          cargo build -p merman-ffi
          dart run example/smoke.dart ../../target/debug/libmerman_ffi.so

  apple-ffi-smoke:
    name: apple-ffi-smoke
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Apple XCFramework
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
        run: bash scripts/build-apple-xcframework.sh

      - name: Validate Swift package
        run: |
          swift package describe
          swift build
          swift run --package-path platforms/apple/examples/smoke MermanAppleSmoke
