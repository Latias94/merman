name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.8.0-alpha.2"
        required: true
        type: string
      source_ref:
        description: "Protected branch (main), matching release tag, or refs/tags/<release-tag> to validate"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-inputs:
    name: validate-inputs
    runs-on: ubuntu-24.04
    outputs:
      source_ref: ${{ steps.release.outputs.source_ref }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release inputs
        id: release
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          DISPATCH_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$'
          tag_re="^v${semver_re#^}"
          fail() {
            echo "::error::$1" >&2
            exit 1
          }

          VERSION="$DISPATCH_VERSION"
          RELEASE_TAG="v$VERSION"
          SOURCE_REF="$DISPATCH_SOURCE_REF"

          [[ "$VERSION" =~ $semver_re ]] || fail "version must match X.Y.Z or X.Y.Z-alpha.N/beta.N/rc.N."
          [[ "$SOURCE_REF" != *$'\n'* && "$SOURCE_REF" != *$'\r'* ]] || fail "source_ref must be a single line."
          validated_source_ref="$SOURCE_REF"
          if [[ "$SOURCE_REF" == "main" || "$SOURCE_REF" == "refs/heads/main" ]]; then
            :
          elif [[ "$SOURCE_REF" =~ $tag_re || "$SOURCE_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            source_tag="${SOURCE_REF#refs/tags/}"
            [[ "$source_tag" == "$RELEASE_TAG" ]] || fail "source_ref tag must match version."
            validated_source_ref="refs/tags/$source_tag"
          else
            fail "source_ref must be main, refs/heads/main, a matching release tag, or refs/tags/<release-tag>."
          fi

          {
            printf 'source_ref=%s\n' "$validated_source_ref"
            printf 'release_tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"

  versions-and-packages:
    needs: validate-inputs
    name: versions-and-packages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Verify release versions
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: python3 scripts/release-version.py check --version "$VERSION"

      - name: Verify release crate order docs
        run: python3 scripts/verify-release-crate-order.py

      - name: Verify FFI publish surface
        run: python3 scripts/verify-ffi-publish-surface.py

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Build package file lists
        run: |
          set -euo pipefail
          mkdir -p target/package-lists
          python3 tools/publish.py --list-crates-io-packages > target/package-lists/crates.txt
          while IFS= read -r crate; do
            cargo package -p "$crate" --list > "target/package-lists/$crate.txt"
          done < target/package-lists/crates.txt

      - name: Verify registry-independent crate dry-runs
        run: |
          set -euo pipefail

          crate_version_available() {
            local crate="$1"
            local version="$2"
            local tmpdir="${RUNNER_TEMP:-/tmp}"

            (
              cd "$tmpdir"
              cargo info "$crate@$version" --registry crates-io >/dev/null 2>&1
            )
          }

          workspace_crate_version() {
            local crate="$1"

            cargo pkgid -p "$crate" | sed 's/.*@//'
          }

          publish_dry_run() {
            local crate="$1"
            local crate_version="$2"

            if crate_version_available "$crate" "$crate_version"; then
              echo "Skipping dry-run for $crate $crate_version because it is already published"
              return 0
            fi

            cargo publish -p "$crate" --locked --dry-run --registry crates-io
          }

          registry_independent_crates=(
            roughr-merman
            dugong-graphlib
            manatee
            merman-core
            merman-elk-layered
          )

          for crate in "${registry_independent_crates[@]}"; do
            publish_dry_run "$crate" "$(workspace_crate_version "$crate")"
          done

      - name: Upload package lists
        uses: actions/upload-artifact@v6
        with:
          name: crate-package-lists
          path: target/package-lists/*.txt

  python-wheel:
    needs: validate-inputs
    name: python-wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025-vs2026
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify release versions
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: python scripts/release-version.py check --version "$VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and smoke wheel
        run: python scripts/build-python-uniffi-wheel.py --run-smoke

      - name: Repair Linux wheel
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install --upgrade auditwheel
          mkdir -p target/python-wheels/repaired
          python -m auditwheel repair target/python-wheels/merman-*.whl --wheel-dir target/python-wheels/repaired
          rm target/python-wheels/merman-*.whl
          mv target/python-wheels/repaired/merman-*.whl target/python-wheels/
          rmdir target/python-wheels/repaired

      - name: Check wheel metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check target/python-wheels/merman-*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: preflight-python-wheel-${{ runner.os }}-${{ runner.arch }}
          path: target/python-wheels/merman-*.whl

  android-aar:
    needs: validate-inputs
    name: android-aar
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Verify release versions
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: python3 scripts/release-version.py check --version "$VERSION"

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r28

      - name: Build Android native libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: python3 platforms/android/build-android.py --targets aarch64-linux-android x86_64-linux-android

      - name: Build Android AAR
        run: gradle -p platforms/android assembleRelease --stacktrace

      - name: Verify Maven publication metadata
        run: gradle -p platforms/android publishReleasePublicationToLocalStagingRepository --stacktrace

  apple-xcframework:
    needs: validate-inputs
    name: apple-xcframework
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Verify release versions
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: python3 scripts/release-version.py check --version "$VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Apple XCFramework
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
        run: bash scripts/build-apple-xcframework.sh

      - name: Validate Swift package
        run: |
          swift package describe
          swift build
          swift run --package-path platforms/apple/examples/smoke MermanAppleSmoke

  web-npm-dry-run:
    needs: validate-inputs
    name: web-npm-dry-run
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Verify release versions
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: python3 scripts/release-version.py check --version "$VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: platforms/web/package-lock.json

      - name: Install WASM tools
        run: |
          cargo install wasm-bindgen-cli --version 0.2.108 --locked
          cargo install wasm-pack --version 0.15.0 --locked

      - name: Install web package dependencies
        run: npm ci --prefix platforms/web

      - name: Build web package
        run: npm run build --prefix platforms/web

      - name: Verify web package
        run: npm run prepack --prefix platforms/web

      - name: Smoke web package
        run: npm run smoke --prefix platforms/web

      - name: Pack npm package dry-run
        working-directory: platforms/web
        run: npm pack --dry-run

  vscode-extension-dry-run:
    needs: validate-inputs
    name: vscode-extension-dry-run (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: macos-15
            target: darwin-arm64
          - os: macos-15-intel
            target: darwin-x64
          - os: windows-2025-vs2026
            target: win32-x64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify release versions
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: python scripts/release-version.py check --version "$VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tools/vscode-extension/package-lock.json

      - name: Install extension dependencies
        working-directory: tools/vscode-extension
        run: npm ci

      - name: Build release runtime binaries
        run: cargo build --release --locked -p merman-lsp -p merman-cli

      - name: Typecheck extension
        working-directory: tools/vscode-extension
        run: npm run check

      - name: Test extension
        working-directory: tools/vscode-extension
        run: npm test

      - name: Stage runtime binaries
        working-directory: tools/vscode-extension
        run: npm run prepare:binaries

      - name: Smoke extension host
        if: runner.os == 'Linux'
        working-directory: tools/vscode-extension
        run: xvfb-run -a npm run test:extension-host

      - name: Smoke extension host
        if: runner.os != 'Linux'
        working-directory: tools/vscode-extension
        run: npm run test:extension-host

      - name: Derive VSIX release metadata
        id: vsix
        env:
          RELEASE_VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: |
          set -euo pipefail
          manifest_version="$(python scripts/release-version.py vscode --version "$RELEASE_VERSION")"
          {
            printf 'release_version=%s\n' "$RELEASE_VERSION"
            printf 'manifest_version=%s\n' "$manifest_version"
          } >> "$GITHUB_OUTPUT"
          echo "VSIX release_version=${RELEASE_VERSION} manifest_version=${manifest_version}"

      - name: Package VSIX
        working-directory: tools/vscode-extension
        env:
          MERMAN_RELEASE_VERSION: ${{ steps.vsix.outputs.release_version }}
        run: npm run package -- --target "${{ matrix.target }}" --out "merman-vscode-${{ matrix.target }}.vsix"

      - name: Verify VSIX contents
        working-directory: tools/vscode-extension
        env:
          MERMAN_RELEASE_VERSION: ${{ steps.vsix.outputs.release_version }}
        run: npm run verify:vsix -- --vsix "merman-vscode-${{ matrix.target }}.vsix" --platform "${{ matrix.target }}" --target "${{ matrix.target }}"

      - name: Smoke packaged VSIX
        if: runner.os == 'Linux'
        working-directory: tools/vscode-extension
        run: xvfb-run -a npm run smoke:vsix -- --vsix "merman-vscode-${{ matrix.target }}.vsix"

      - name: Smoke packaged VSIX
        if: runner.os != 'Linux'
        working-directory: tools/vscode-extension
        run: npm run smoke:vsix -- --vsix "merman-vscode-${{ matrix.target }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: preflight-vscode-extension-${{ matrix.target }}
          path: tools/vscode-extension/merman-vscode-${{ matrix.target }}.vsix
          if-no-files-found: error

  flutter-dry-run:
    needs: validate-inputs
    name: flutter-dry-run
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Verify release versions
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: python3 scripts/release-version.py check --version "$VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-linux-android,x86_64-linux-android,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install desktop cross tools
        run: |
          if ! command -v zig >/dev/null 2>&1; then
            brew install zig
          fi
          cargo install cargo-zigbuild --version 0.21.8 --locked

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r28

      - name: Build Android native libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: python3 platforms/android/build-android.py --targets aarch64-linux-android x86_64-linux-android

      - name: Inject Android libraries into Flutter package
        run: |
          mkdir -p platforms/flutter/android/src/main/jniLibs
          cp -R platforms/android/src/main/jniLibs/* platforms/flutter/android/src/main/jniLibs/

      - name: Build and inject iOS XCFramework
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: bash platforms/flutter/build-ios.sh

      - name: Build desktop native libraries
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: bash platforms/flutter/build-desktop.sh --all

      - name: Setup Dart with pub.dev OIDC credentials
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          channel: stable
          cache: true

      - name: Validate Flutter package
        working-directory: platforms/flutter
        run: |
          flutter pub get
          flutter analyze
          dart format --set-exit-if-changed lib example
          dart pub publish --dry-run
