name: Release Web (npm)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag/version to publish, for example v0.8.0-alpha.2"
        required: true
        type: string
      source_ref:
        description: "Protected branch (main), matching release tag, refs/tags/<release-tag>, or full 40-character SHA to build from"
        required: true
        default: "main"
        type: string
      publish_to_npm:
        description: "Publish @mermanjs/web to npm after checks pass"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-inputs:
    name: validate-inputs
    runs-on: ubuntu-24.04
    outputs:
      source_ref: ${{ steps.release.outputs.source_ref }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release inputs
        id: release
        shell: bash
        env:
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
          DISPATCH_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$'
          tag_re="^v${semver_re#^}"
          sha_re='^[0-9a-fA-F]{40}$'

          fail() {
            echo "::error::$1" >&2
            exit 1
          }

          RELEASE_TAG="$DISPATCH_RELEASE_TAG"
          SOURCE_REF="$DISPATCH_SOURCE_REF"

          [[ "$RELEASE_TAG" =~ $tag_re ]] || fail "release_tag must match vX.Y.Z or vX.Y.Z-alpha.N/beta.N/rc.N."
          [[ "$SOURCE_REF" != *$'\n'* && "$SOURCE_REF" != *$'\r'* ]] || fail "source_ref must be a single line."
          if [[ "$SOURCE_REF" == "main" || "$SOURCE_REF" == "refs/heads/main" ]]; then
            :
          elif [[ "$SOURCE_REF" =~ $sha_re ]]; then
            :
          elif [[ "$SOURCE_REF" =~ $tag_re || "$SOURCE_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            source_tag="${SOURCE_REF#refs/tags/}"
            [[ "$source_tag" == "$RELEASE_TAG" ]] || fail "source_ref tag must match release_tag."
          else
            fail "source_ref must be main, refs/heads/main, a matching release tag, refs/tags/<release-tag>, or a full 40-character SHA."
          fi

          VERSION="${RELEASE_TAG#v}"
          [[ "$VERSION" =~ $semver_re ]] || fail "release_tag contains an unsupported SemVer version."

          {
            printf 'source_ref=%s\n' "$SOURCE_REF"
            printf 'release_tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: validate-inputs
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Use validated release metadata
        id: version
        env:
          RELEASE_TAG: ${{ needs.validate-inputs.outputs.release_tag }}
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: |
          set -euo pipefail
          {
            printf 'tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Verify web package version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node - <<'JS'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const pkg = JSON.parse(fs.readFileSync("platforms/web/package.json", "utf8"));
          if (pkg.name !== "@mermanjs/web") {
            console.error(`::error::Unexpected npm package name ${pkg.name}`);
            process.exit(1);
          }
          if (pkg.version !== version) {
            console.error(`::error::Web package version '${pkg.version}' does not match tag ${version}`);
            process.exit(1);
          }
          console.log(`@mermanjs/web ${pkg.version}`);
          JS

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install WASM tools
        run: |
          cargo install wasm-bindgen-cli --version 0.2.108 --locked
          cargo install wasm-pack --version 0.15.0 --locked

      - name: Install web package dependencies
        run: npm ci --prefix platforms/web

      - name: Build web package
        run: npm run build --prefix platforms/web

      - name: Verify web package
        run: npm run prepack --prefix platforms/web

      - name: Smoke web package
        run: npm run smoke --prefix platforms/web

      - name: Pack web package
        id: pack
        working-directory: platforms/web
        run: |
          set -euo pipefail
          package_dir="$RUNNER_TEMP/npm-package"
          mkdir -p "$package_dir"
          npm pack --json --pack-destination "$package_dir" | tee "$RUNNER_TEMP/npm-pack.json"
          package_file="$(node -e '
          const fs = require("node:fs");
          const path = require("node:path");
          const pack = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
          if (!Array.isArray(pack) || pack.length !== 1) {
            throw new Error("expected one packed npm tarball");
          }
          process.stdout.write(path.resolve(process.argv[2], pack[0].filename));
          ' "$RUNNER_TEMP/npm-pack.json" "$package_dir")"
          test -f "$package_file"
          printf 'package_file=%s\n' "$package_file" >> "$GITHUB_OUTPUT"

      - name: Upload web package artifact
        uses: actions/upload-artifact@v6
        with:
          name: merman-web-npm-package
          path: ${{ steps.pack.outputs.package_file }}

  npm_version:
    needs:
      - validate-inputs
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.npm.outputs.exists }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Check npm version
        id: npm
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: |
          if npm view "@mermanjs/web@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@mermanjs/web $VERSION is already published"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "@mermanjs/web $VERSION is not published yet"
          fi

  publish:
    needs:
      - validate-inputs
      - build
      - npm_version
    if: ${{ inputs.publish_to_npm && needs.npm_version.outputs.exists != 'true' }}
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download web package artifact
        uses: actions/download-artifact@v7
        with:
          name: merman-web-npm-package
          path: target/npm-package

      - name: Publish to npm
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: |
          set -euo pipefail
          package_file="$(find target/npm-package -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$package_file"
          npm_tag="$(node platforms/web/scripts/npm-dist-tag.mjs "$VERSION")"
          npm publish "$package_file" --ignore-scripts --access public --tag "$npm_tag"

  skip_existing:
    needs:
      - validate-inputs
      - build
      - npm_version
    if: ${{ inputs.publish_to_npm && needs.npm_version.outputs.exists == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Skip existing npm version
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: echo "@mermanjs/web $VERSION is already published on npm; skipping."
