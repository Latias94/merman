name: Release Flutter (pub.dev)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: macos-15
    environment: pub.dev
    steps:
      - uses: actions/checkout@v6

      - name: Read version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" != v* ]]; then
            echo "::error::Run this workflow from a v* tag."
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Verify pubspec version matches tag
        run: |
          PUB_VERSION=$(grep '^version:' platforms/flutter/pubspec.yaml | sed 's/version: *//; s/ *$//')
          if [ "$PUB_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::pubspec version '$PUB_VERSION' does not match tag ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          targets: aarch64-linux-android,x86_64-linux-android,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install desktop cross tools
        run: |
          if ! command -v zig >/dev/null 2>&1; then
            brew install zig
          fi
          cargo install cargo-zigbuild --locked

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r28

      - name: Build Android native libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: python3 platforms/android/build-android.py --targets aarch64-linux-android x86_64-linux-android

      - name: Inject Android libraries into Flutter package
        run: |
          mkdir -p platforms/flutter/android/src/main/jniLibs
          cp -R platforms/android/src/main/jniLibs/* platforms/flutter/android/src/main/jniLibs/
          test -f platforms/flutter/android/src/main/jniLibs/arm64-v8a/libmerman_ffi.so
          test -f platforms/flutter/android/src/main/jniLibs/x86_64/libmerman_ffi.so

      - name: Build and inject iOS XCFramework
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          bash platforms/flutter/build-ios.sh
          test -d platforms/flutter/ios/MermanFFI.xcframework

      - name: Build desktop native libraries
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: bash platforms/flutter/build-desktop.sh --all

      - name: Verify Flutter native artifacts
        run: |
          test -f platforms/flutter/macos/Libraries/libmerman_ffi.dylib
          test -f platforms/flutter/windows/merman_ffi.dll
          test -f platforms/flutter/linux/lib/x86_64/libmerman_ffi.so
          test -f platforms/flutter/linux/lib/aarch64/libmerman_ffi.so

      - name: Setup Dart with pub.dev OIDC credentials
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          channel: stable
          cache: true

      - name: Validate Flutter package
        working-directory: platforms/flutter
        run: |
          flutter pub get
          flutter analyze
          dart format --set-exit-if-changed lib example

      - name: Publish to pub.dev
        working-directory: platforms/flutter
        run: dart pub publish --force
