name: Release Flutter (pub.dev)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag/version to publish, for example v0.8.0-alpha.3"
        required: true
        type: string
      source_ref:
        description: "Protected branch (main), matching release tag, or refs/tags/<release-tag> to build from"
        required: true
        default: "main"
        type: string
      publish_to_pub:
        description: "Publish to pub.dev after dry-run passes"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  validate-inputs:
    name: validate-inputs
    runs-on: ubuntu-24.04
    outputs:
      source_ref: ${{ steps.release.outputs.source_ref }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release inputs
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
          DISPATCH_SOURCE_REF: ${{ inputs.source_ref }}
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$'
          tag_re="^v${semver_re#^}"
          fail() {
            echo "::error::$1" >&2
            exit 1
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            RELEASE_TAG="$DISPATCH_RELEASE_TAG"
            SOURCE_REF="$DISPATCH_SOURCE_REF"
          else
            RELEASE_TAG="$GIT_REF_NAME"
            SOURCE_REF="$GIT_REF"
          fi

          [[ "$RELEASE_TAG" =~ $tag_re ]] || fail "release_tag must match vX.Y.Z or vX.Y.Z-alpha.N/beta.N/rc.N."
          [[ "$SOURCE_REF" != *$'\n'* && "$SOURCE_REF" != *$'\r'* ]] || fail "source_ref must be a single line."
          validated_source_ref="$SOURCE_REF"
          if [[ "$SOURCE_REF" == "main" || "$SOURCE_REF" == "refs/heads/main" ]]; then
            :
          elif [[ "$SOURCE_REF" =~ $tag_re || "$SOURCE_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            source_tag="${SOURCE_REF#refs/tags/}"
            [[ "$source_tag" == "$RELEASE_TAG" ]] || fail "source_ref tag must match release_tag."
            validated_source_ref="refs/tags/$source_tag"
          else
            fail "source_ref must be main, refs/heads/main, a matching release tag, or refs/tags/<release-tag>."
          fi

          VERSION="${RELEASE_TAG#v}"
          [[ "$VERSION" =~ $semver_re ]] || fail "release_tag contains an unsupported SemVer version."

          {
            printf 'source_ref=%s\n' "$validated_source_ref"
            printf 'release_tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: validate-inputs
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Use validated release metadata
        id: version
        env:
          RELEASE_TAG: ${{ needs.validate-inputs.outputs.release_tag }}
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: |
          set -euo pipefail
          {
            printf 'tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Verify pubspec version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PUB_VERSION=$(grep '^version:' platforms/flutter/pubspec.yaml | sed 's/version: *//; s/ *$//')
          if [ "$PUB_VERSION" != "$VERSION" ]; then
            echo "::error::pubspec version '$PUB_VERSION' does not match tag $VERSION"
            exit 1
          fi

      - name: Verify FFI publish surface
        run: python3 scripts/verify-ffi-publish-surface.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-linux-android,x86_64-linux-android,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin,x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install desktop cross tools
        run: |
          if ! command -v zig >/dev/null 2>&1; then
            brew install zig
          fi
          cargo install cargo-zigbuild --version 0.21.8 --locked

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r28

      - name: Build Android native libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: python3 platforms/android/build-android.py --targets aarch64-linux-android x86_64-linux-android

      - name: Inject Android libraries into Flutter package
        run: |
          mkdir -p platforms/flutter/android/src/main/jniLibs
          cp -R platforms/android/src/main/jniLibs/* platforms/flutter/android/src/main/jniLibs/
          test -f platforms/flutter/android/src/main/jniLibs/arm64-v8a/libmerman_ffi.so
          test -f platforms/flutter/android/src/main/jniLibs/x86_64/libmerman_ffi.so

      - name: Build and inject iOS XCFramework
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          bash platforms/flutter/build-ios.sh
          test -d platforms/flutter/ios/MermanFFI.xcframework

      - name: Build desktop native libraries
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: bash platforms/flutter/build-desktop.sh --all

      - name: Verify Flutter native artifacts
        run: |
          test -f platforms/flutter/macos/Libraries/libmerman_ffi.dylib
          test -d platforms/flutter/macos/MermanFFI.xcframework
          test -f platforms/flutter/windows/merman_ffi.dll
          test -f platforms/flutter/linux/lib/x86_64/libmerman_ffi.so
          test -f platforms/flutter/linux/lib/aarch64/libmerman_ffi.so

      - name: Setup Dart with pub.dev OIDC credentials
        uses: dart-lang/setup-dart@v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"
          channel: stable
          cache: true

      - name: Validate Flutter package
        working-directory: platforms/flutter
        run: |
          flutter pub get
          flutter analyze
          dart format --set-exit-if-changed lib example
          dart pub publish --dry-run

      - name: Package Flutter release artifact
        run: |
          set -euo pipefail
          tar -czf "$RUNNER_TEMP/merman-flutter-package.tar.gz" -C platforms/flutter .

      - name: Upload Flutter package artifact
        uses: actions/upload-artifact@v6
        with:
          name: merman-flutter-package
          path: ${{ runner.temp }}/merman-flutter-package.tar.gz

  pubdev_version:
    needs:
      - validate-inputs
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.pubdev.outputs.exists }}
    steps:
      - name: Check pub.dev version
        id: pubdev
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          exists = False
          try:
              with urllib.request.urlopen("https://pub.dev/api/packages/merman", timeout=30) as response:
                  data = json.load(response)
              exists = any(item.get("version") == version for item in data.get("versions", []))
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={str(exists).lower()}\n")
          print(f"pub.dev merman {version} exists: {exists}")
          PY

  publish:
    needs:
      - validate-inputs
      - build
      - pubdev_version
    if: ${{ github.event_name == 'push' && needs.pubdev_version.outputs.exists != 'true' }}
    runs-on: macos-15
    environment: pub.dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Dart with pub.dev OIDC credentials
        uses: dart-lang/setup-dart@v1

      - name: Download Flutter package artifact
        uses: actions/download-artifact@v6
        with:
          name: merman-flutter-package
          path: target/flutter-package

      - name: Extract Flutter package artifact
        run: |
          set -euo pipefail
          mkdir -p target/flutter-publish
          tar -xzf target/flutter-package/merman-flutter-package.tar.gz -C target/flutter-publish

      - name: Publish to pub.dev
        working-directory: target/flutter-publish
        run: dart pub publish --force --skip-validation

  skip_existing:
    needs:
      - validate-inputs
      - build
      - pubdev_version
    if: ${{ github.event_name == 'push' && needs.pubdev_version.outputs.exists == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Skip existing pub.dev version
        env:
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: echo "merman $VERSION is already published on pub.dev; skipping."

  explain_manual_publish_skip:
    needs:
      - validate-inputs
      - build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_pub }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Explain manual pub.dev publish skip
        run: |
          echo "::warning::pub.dev automated publishing only accepts GitHub Actions runs triggered by a pushed git tag. This manual run completed validation but did not publish."
