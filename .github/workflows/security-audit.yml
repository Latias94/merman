name: Security Audit

on:
  push:
    branches:
      - main
      - master
    paths:
      - Cargo.lock
      - Cargo.toml
      - "crates/**/Cargo.toml"
      - fuzz/Cargo.lock
      - fuzz/Cargo.toml
      - ".github/workflows/security-audit.yml"
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - "crates/**/Cargo.toml"
      - fuzz/Cargo.lock
      - fuzz/Cargo.toml
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo-audit (${{ matrix.lockfile }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        lockfile:
          - Cargo.lock
          - fuzz/Cargo.lock
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit --file "${{ matrix.lockfile }}"
