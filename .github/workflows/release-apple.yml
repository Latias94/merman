name: Release Apple (SwiftPM)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload the XCFramework to, for example v0.7.0-alpha.2"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    environment: github-release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}

      - name: Read version from tag
        id: version
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "::error::Release tag '$RELEASE_TAG' must start with v."
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Verify Cargo workspace version matches tag
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')
          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Cargo workspace version '$CARGO_VERSION' does not match tag ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Apple XCFramework
        env:
          MERMAN_AUTO_INSTALL_RUST_TARGETS: "false"
        run: bash scripts/build-apple-xcframework.sh

      - name: Validate Swift package
        run: |
          swift package describe
          swift build
          swift run --package-path platforms/apple/examples/smoke MermanAppleSmoke

      - name: Package XCFramework
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          cd platforms/apple
          ARCHIVE="Merman.xcframework-${RELEASE_TAG}.zip"
          ditto -c -k --sequesterRsrc --keepParent Merman.xcframework "$ARCHIVE"
          echo "APPLE_ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          CHECKSUM=$(swift package compute-checksum "$ARCHIVE")
          echo "CHECKSUM=$CHECKSUM" >> "$GITHUB_ENV"
          echo "$CHECKSUM  $ARCHIVE" > "$ARCHIVE.checksum"

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v6
        with:
          name: merman-apple-xcframework
          path: |
            platforms/apple/Merman.xcframework-*.zip
            platforms/apple/Merman.xcframework-*.zip.checksum

      - name: Upload XCFramework to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" platforms/apple/Merman.xcframework-*.zip platforms/apple/Merman.xcframework-*.zip.checksum --clobber
          else
            echo "::warning::GitHub Release $RELEASE_TAG does not exist yet; XCFramework artifact was uploaded for manual attachment."
          fi
