name: Release Python Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025-vs2026

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Read version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" != v* ]]; then
            echo "::error::Run this workflow from a v* tag."
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify Python package version matches tag
        run: |
          PACKAGE_VERSION=$(python - <<'PY'
          import tomllib
          with open("platforms/python/merman/pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )
          if [ "$PACKAGE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Python package version '$PACKAGE_VERSION' does not match tag ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and smoke wheel
        run: python scripts/build-python-uniffi-wheel.py --run-smoke

      - name: Repair Linux wheel
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install --upgrade auditwheel
          mkdir -p target/python-wheels/repaired
          python -m auditwheel repair target/python-wheels/merman-*.whl --wheel-dir target/python-wheels/repaired
          rm target/python-wheels/merman-*.whl
          mv target/python-wheels/repaired/merman-*.whl target/python-wheels/
          rmdir target/python-wheels/repaired

      - name: Run Python example
        run: PYTHONPATH=platforms/python/merman/src python platforms/python/merman/examples/smoke.py

      - name: Run final wheel install smoke
        run: |
          python -m venv target/python-final-wheel-smoke
          if [ -f target/python-final-wheel-smoke/Scripts/python.exe ]; then
            PYTHON=target/python-final-wheel-smoke/Scripts/python.exe
          else
            PYTHON=target/python-final-wheel-smoke/bin/python
          fi
          "$PYTHON" -m pip install --no-deps target/python-wheels/merman-*.whl
          "$PYTHON" -c "import merman; e = merman.MermanEngine(); s = 'flowchart TD\nA[Hello] --> B[World]'; assert e.abi_version() == 2; assert e.render_svg(s, None).startswith('<svg'); assert 'Hello' in e.render_ascii(s, None); assert e.validate(s, None).valid; assert 'flowchart' in e.supported_diagrams(); assert 'default' in e.themes()"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-wheel-${{ runner.os }}-${{ runner.arch }}
          path: target/python-wheels/merman-*.whl

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: python-wheel-*
          path: wheels
          merge-multiple: true

      - name: Check wheel metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check wheels/merman-*.whl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wheels/merman-*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels
