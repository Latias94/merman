name: Release Python Wheels

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload wheels to, for example v0.7.0-alpha.2"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "main"
        type: string
      publish_to_pypi:
        description: "Publish wheels to PyPI after checks pass"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025-vs2026

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}

      - name: Read version from tag
        id: version
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "::error::Release tag '$RELEASE_TAG' must start with v."
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify Python package version matches tag
        run: python scripts/release-version.py check --version "${{ steps.version.outputs.version }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and smoke wheel
        run: python scripts/build-python-uniffi-wheel.py --run-smoke

      - name: Repair Linux wheel
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install --upgrade auditwheel
          mkdir -p target/python-wheels/repaired
          python -m auditwheel repair target/python-wheels/merman-*.whl --wheel-dir target/python-wheels/repaired
          rm target/python-wheels/merman-*.whl
          mv target/python-wheels/repaired/merman-*.whl target/python-wheels/
          rmdir target/python-wheels/repaired

      - name: Run Python example
        run: PYTHONPATH=platforms/python/merman/src python platforms/python/merman/examples/smoke.py

      - name: Run final wheel install smoke
        run: |
          python -m venv target/python-final-wheel-smoke
          if [ -f target/python-final-wheel-smoke/Scripts/python.exe ]; then
            PYTHON=target/python-final-wheel-smoke/Scripts/python.exe
          else
            PYTHON=target/python-final-wheel-smoke/bin/python
          fi
          "$PYTHON" -m pip install --no-deps target/python-wheels/merman-*.whl
          "$PYTHON" -c "import merman; e = merman.MermanEngine(); s = 'flowchart TD\nA[Hello] --> B[World]'; assert e.abi_version() == 1; assert e.render_svg(s, None).startswith('<svg'); assert 'Hello' in e.render_ascii(s, None); assert e.validate(s, None).valid; assert 'flowchart' in e.supported_diagrams(); assert 'default' in e.supported_themes()"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-wheel-${{ runner.os }}-${{ runner.arch }}
          path: target/python-wheels/merman-*.whl

  release:
    needs: build
    runs-on: ubuntu-24.04
    environment: pypi
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: python-wheel-*
          path: wheels
          merge-multiple: true

      - name: Check wheel metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check wheels/merman-*.whl

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" wheels/merman-*.whl --clobber
          else
            echo "::warning::GitHub Release $RELEASE_TAG does not exist yet; wheel artifacts were uploaded for manual attachment."
          fi

      - name: Publish to PyPI
        if: ${{ inputs.publish_to_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels
          skip-existing: true
