name: Release Python Wheels

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload wheels to, for example v0.8.0-alpha.3"
        required: true
        type: string
      source_ref:
        description: "Protected branch (main), matching release tag, or refs/tags/<release-tag> to build from"
        required: true
        default: "main"
        type: string
      publish_to_pypi:
        description: "Publish wheels to PyPI after checks pass"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  validate-inputs:
    name: validate-inputs
    runs-on: ubuntu-24.04
    outputs:
      source_ref: ${{ steps.release.outputs.source_ref }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release inputs
        id: release
        shell: bash
        env:
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
          DISPATCH_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$'
          tag_re="^v${semver_re#^}"
          fail() {
            echo "::error::$1" >&2
            exit 1
          }

          RELEASE_TAG="$DISPATCH_RELEASE_TAG"
          SOURCE_REF="$DISPATCH_SOURCE_REF"

          [[ "$RELEASE_TAG" =~ $tag_re ]] || fail "release_tag must match vX.Y.Z or vX.Y.Z-alpha.N/beta.N/rc.N."
          [[ "$SOURCE_REF" != *$'\n'* && "$SOURCE_REF" != *$'\r'* ]] || fail "source_ref must be a single line."
          validated_source_ref="$SOURCE_REF"
          if [[ "$SOURCE_REF" == "main" || "$SOURCE_REF" == "refs/heads/main" ]]; then
            :
          elif [[ "$SOURCE_REF" =~ $tag_re || "$SOURCE_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            source_tag="${SOURCE_REF#refs/tags/}"
            [[ "$source_tag" == "$RELEASE_TAG" ]] || fail "source_ref tag must match release_tag."
            validated_source_ref="refs/tags/$source_tag"
          else
            fail "source_ref must be main, refs/heads/main, a matching release tag, or refs/tags/<release-tag>."
          fi

          VERSION="${RELEASE_TAG#v}"
          [[ "$VERSION" =~ $semver_re ]] || fail "release_tag contains an unsupported SemVer version."

          {
            printf 'source_ref=%s\n' "$validated_source_ref"
            printf 'release_tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: validate-inputs
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025-vs2026

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-inputs.outputs.source_ref }}
          persist-credentials: false

      - name: Use validated release metadata
        id: version
        env:
          RELEASE_TAG: ${{ needs.validate-inputs.outputs.release_tag }}
          VERSION: ${{ needs.validate-inputs.outputs.version }}
        run: |
          set -euo pipefail
          {
            printf 'tag=%s\n' "$RELEASE_TAG"
            printf 'version=%s\n' "$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify Python package version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: python scripts/release-version.py check --version "$VERSION"

      - name: Verify FFI publish surface
        run: python scripts/verify-ffi-publish-surface.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and smoke wheel
        run: python scripts/build-python-uniffi-wheel.py --run-smoke

      - name: Repair Linux wheel
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install --upgrade auditwheel
          mkdir -p target/python-wheels/repaired
          python -m auditwheel repair target/python-wheels/merman-*.whl --wheel-dir target/python-wheels/repaired
          rm target/python-wheels/merman-*.whl
          mv target/python-wheels/repaired/merman-*.whl target/python-wheels/
          rmdir target/python-wheels/repaired

      - name: Run Python example
        run: PYTHONPATH=platforms/python/merman/src python platforms/python/merman/examples/smoke.py

      - name: Run final wheel install smoke
        run: |
          python -m venv target/python-final-wheel-smoke
          if [ -f target/python-final-wheel-smoke/Scripts/python.exe ]; then
            PYTHON=target/python-final-wheel-smoke/Scripts/python.exe
          else
            PYTHON=target/python-final-wheel-smoke/bin/python
          fi
          "$PYTHON" -m pip install --no-deps target/python-wheels/merman-*.whl
          "$PYTHON" - <<'PY'
          import merman


          class Measurer(merman.MermanTextMeasurer):
              def __init__(self):
                  self.calls = 0

              def measure(self, request):
                  self.calls += 1
                  return merman.MermanTextMeasureResult(
                      width=max(len(request.text) * 8.0, 1.0),
                      height=max(request.line_height, 1.0),
                      line_count=1,
                  )


          e = merman.MermanEngine()
          s = 'flowchart TD\nA[Hello] --> B[World]'
          assert e.abi_version() == 2
          assert e.render_svg(s, None).startswith('<svg')
          assert 'Hello' in e.render_ascii(s, None)
          assert e.validate(s, None).valid
          assert 'flowchart' in e.supported_diagrams()
          assert 'default' in e.supported_themes()
          assert any(item.diagram_type == 'flowchart' for item in e.diagram_family_capabilities())
          assert hasattr(merman, 'MermanLintRuleCatalogEntry')
          lint_rules = e.lint_rule_catalog()
          assert lint_rules
          assert all(isinstance(rule, merman.MermanLintRuleCatalogEntry) for rule in lint_rules)
          assert any(
              rule.id == 'merman.authoring.flowchart.explicit_direction'
              and rule.origin == 'merman_authoring'
              for rule in lint_rules
          )
          configurable_rules = e.configurable_lint_rule_catalog()
          assert configurable_rules
          assert all(isinstance(rule, merman.MermanLintRuleCatalogEntry) for rule in configurable_rules)
          assert any(
              rule.id == 'merman.authoring.flowchart.explicit_direction'
              and rule.configurable
              for rule in configurable_rules
          )
          assert all(rule.configurable for rule in configurable_rules)

          measurer = Measurer()
          reusable = e.reusable_engine_with_text_measurer(None, measurer)
          assert reusable.render_svg(s).startswith('<svg')
          assert measurer.calls > 0

          setter_measurer = Measurer()
          reusable = e.reusable_engine(None)
          reusable.set_text_measurer(setter_measurer)
          assert reusable.render_svg(s).startswith('<svg')
          calls_after_set = setter_measurer.calls
          assert calls_after_set > 0
          reusable.clear_text_measurer()
          assert reusable.render_svg(s).startswith('<svg')
          assert setter_measurer.calls == calls_after_set


          class FailingMeasurer(merman.MermanTextMeasurer):
              def measure(self, request):
                  raise RuntimeError('host measurer failed')


          failing = e.reusable_engine_with_text_measurer(None, FailingMeasurer())
          try:
              failing.render_svg(s)
          except merman.MermanError.Binding as error:
              assert 'host measurer failed' in error.message
          else:
              raise AssertionError('expected host text measurer callback failure')
          failing.set_text_measurer(Measurer())
          assert failing.render_svg(s).startswith('<svg')
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-wheel-${{ runner.os }}-${{ runner.arch }}
          path: target/python-wheels/merman-*.whl

  verify-wheel-metadata:
    needs:
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: python-wheel-*
          path: wheels
          merge-multiple: true

      - name: Check wheel metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check wheels/merman-*.whl

  github-release:
    needs:
      - validate-inputs
      - verify-wheel-metadata
    runs-on: ubuntu-24.04
    environment: github-release
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: python-wheel-*
          path: wheels
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate-inputs.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" wheels/merman-*.whl --clobber
          else
            echo "::error::GitHub Release $RELEASE_TAG does not exist; create it before uploading Python wheel assets."
            exit 1
          fi

  publish:
    needs:
      - verify-wheel-metadata
      - github-release
    if: ${{ inputs.publish_to_pypi }}
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: python-wheel-*
          path: wheels
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels
          skip-existing: true
