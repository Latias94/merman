name: VS Code Extension

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/vscode-extension.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "tools/vscode-extension/**"
  pull_request:
    paths:
      - ".github/workflows/vscode-extension.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "tools/vscode-extension/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vscode-extension-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: macos-15
            target: darwin-arm64
          - os: macos-15-intel
            target: darwin-x64
          - os: windows-2025-vs2026
            target: win32-x64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tools/vscode-extension/package-lock.json

      - name: Install extension dependencies
        working-directory: tools/vscode-extension
        run: npm ci

      - name: Build release runtime binaries
        run: cargo build --release --locked -p merman-lsp -p merman-cli

      - name: Typecheck extension
        working-directory: tools/vscode-extension
        run: npm run check

      - name: Test extension
        working-directory: tools/vscode-extension
        run: npm test

      - name: Stage runtime binaries
        working-directory: tools/vscode-extension
        run: npm run prepare:binaries

      - name: Package VSIX
        working-directory: tools/vscode-extension
        run: npm run package -- --target "${{ matrix.target }}" --out "merman-vscode-${{ matrix.target }}.vsix"

      - name: Verify VSIX contents
        working-directory: tools/vscode-extension
        run: npm run verify:vsix -- --vsix "merman-vscode-${{ matrix.target }}.vsix" --platform "${{ matrix.target }}" --target "${{ matrix.target }}"

      - name: Upload VSIX
        uses: actions/upload-artifact@v6
        with:
          name: merman-vscode-${{ matrix.target }}
          path: tools/vscode-extension/merman-vscode-${{ matrix.target }}.vsix
          if-no-files-found: error
