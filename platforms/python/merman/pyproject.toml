[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "merman"
version = "0.8.0a2"
description = "Experimental Python bindings for Merman headless Mermaid rendering."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT OR Apache-2.0"
license-files = ["LICENSE"]
authors = [
  { name = "Mingzhen Zhuang", email = "superfrankie621@gmail.com" },
]
keywords = ["mermaid", "diagrams", "uniffi", "svg", "headless"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python :: 3",
  "Programming Language :: Rust",
  "Topic :: Multimedia :: Graphics",
  "Topic :: Software Development :: Libraries",
]

[project.urls]
Homepage = "https://github.com/Latias94/merman"
Repository = "https://github.com/Latias94/merman"
Documentation = "https://github.com/Latias94/merman/blob/main/docs/bindings/PYTHON_UNIFFI.md"
Issues = "https://github.com/Latias94/merman/issues"
Changelog = "https://github.com/Latias94/merman/blob/main/platforms/python/merman/CHANGELOG.md"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
merman = ["merman_uniffi.py", "*.dll", "*.dylib", "*.so"]
