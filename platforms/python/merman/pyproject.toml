[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "merman"
version = "0.7.0"
description = "Experimental Python bindings for merman generated by UniFFI."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT OR Apache-2.0" }
authors = [
  { name = "Mingzhen Zhuang", email = "superfrankie621@gmail.com" },
]
keywords = ["mermaid", "diagrams", "uniffi", "svg", "headless"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Rust",
  "Topic :: Multimedia :: Graphics",
  "Topic :: Software Development :: Libraries",
]

[project.urls]
Homepage = "https://github.com/Latias94/merman"
Repository = "https://github.com/Latias94/merman"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
merman = ["merman_uniffi.py", "*.dll", "*.dylib", "*.so"]
