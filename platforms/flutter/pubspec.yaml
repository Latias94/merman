name: merman_flutter
description: Experimental Dart FFI wrapper for merman headless Mermaid rendering.
version: 0.7.0
repository: https://github.com/Latias94/merman

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  ffi: ^2.1.3
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: io.merman.flutter
        pluginClass: MermanFlutterPlugin
